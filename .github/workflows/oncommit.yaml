name: Build and Publish Docker Image

on:
  push:
    branches: [ "**" ] # Triggers on any commit to any branch
  workflow_dispatch:   # Allows you to trigger it manually from the Actions tab

env:
  REGISTRY: ghcr.io
  # github.repository is usually formatted as "owner/repo"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # This specifically grants the GITHUB_TOKEN the rights it needs 
    # to push an image to the registry.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generates tags like 'latest' for default branch, or 'pr-123' etc.

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
